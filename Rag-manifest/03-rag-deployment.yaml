apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  namespace: rag
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: rag
  template:
    metadata:
      labels:
        app: rag
    spec:
      containers:
        - name: rag
          image: suhannugul/capstonerag:latest
          ports:
            - containerPort: 8090
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-configmap
