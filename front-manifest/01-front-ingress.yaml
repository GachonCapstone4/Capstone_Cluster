# ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: front-ingress
  namespace: front
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-route53"
    # ── 기본 설정 ──────────────────────────────────────────
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"


    # ── App Pod: Least Connection ──────────────────────────
    nginx.ingress.kubernetes.io/upstream-hash-by: ""    # 비활성 (RR or LeastConn)
    nginx.ingress.kubernetes.io/load-balance: "ewma"    # ewma = 가중 최소연결 (LeastConn 대체)
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - capstone.studylink.click
      secretName: capstone-tls-prod
  rules:
    - host: capstone.studylink.click
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-service      # App Pod 서비스
                port:
                  number: 80