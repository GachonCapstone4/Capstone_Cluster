apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dev-readonly-role
rules:
  - apiGroups: ["", "apps", "batch", "extensions"]
    resources: ["pods", "pods/log", "deployments", "replicasets", "statefulsets", "daemonsets", "services", "endpoints", "nodes", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
